{% extends "base.html" %}

{% block main %}
<header class="page-header">
  <h1>Rename Collection</h1>
  <p class="page-subtitle">Change the name of this collection.</p>
</header>

<form class="bookmark-form"
      method="post"
      action="{{ url_for('edit_collection', collection_id=collection.id) }}">

  <div class="field field-primary">
    <label for="name">Collection name <span class="required">*</span></label>
    <input id="name" name="name" type="text" required autofocus
           value="{{ form_name }}">
    {% if error %}<p class="field-error">{{ error }}</p>{% endif %}
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Save</button>
    <a class="btn btn-link" href="{{ url_for('collections') }}">Cancel</a>
  </div>
</form>
{% endblock %}
